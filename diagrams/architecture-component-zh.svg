<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 660" width="920" height="660">
  <defs>
    <style>
      text { font-family: 'PingFang SC','Microsoft YaHei',system-ui,sans-serif; }
      .mono { font-family: 'Courier New',Courier,monospace; }
    </style>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6b7280"/>
    </marker>
    <marker id="arr2" markerWidth="8" markerHeight="6" refX="1" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="920" height="660" fill="#ffffff" rx="10" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Title -->
  <text x="460" y="26" font-size="14" font-weight="bold" fill="#111827" text-anchor="middle">组件分工 —— 谁在哪跑（先看这个）</text>
  <text x="460" y="42" font-size="10" fill="#9ca3af" text-anchor="middle">最常见误解："GitHub Actions 是引擎"。不是。思考在你的电脑。GitHub 只做存储 + cron。</text>

  <!-- ═══ BOX 1: 你的电脑 ═══ -->
  <rect x="18" y="54" width="884" height="292" rx="7" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <!-- Header bar -->
  <rect x="18" y="54" width="884" height="30" rx="7" fill="#3b82f6"/>
  <rect x="18" y="70" width="884" height="14" fill="#3b82f6"/>
  <text x="36" y="74" font-size="12" font-weight="bold" fill="#ffffff">💻  你的电脑  ——  "思考"发生的地方，所有 AI 在这里运行</text>

  <!-- Claude Code inner box -->
  <rect x="36" y="92" width="848" height="44" rx="5" fill="#2563eb" stroke="#1d4ed8" stroke-width="1"/>
  <text x="56" y="110" font-size="11" font-weight="bold" fill="#ffffff">💬 Claude Code (CLI 或 IDE)</text>
  <text x="56" y="126" font-size="9.5" fill="#bfdbfe">← AI 大脑。读你的自然语言，把 NL 跟 SKILL.md description 匹配，挑对的 skill，跑它</text>

  <!-- Arrow down -->
  <line x1="460" y1="136" x2="460" y2="150" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Skills folder inner box -->
  <rect x="36" y="152" width="848" height="182" rx="5" fill="#f8faff" stroke="#93c5fd" stroke-width="1"/>
  <text x="56" y="170" font-size="10" font-weight="bold" fill="#1e40af" class="mono">~/.claude/skills/  （本仓库，clone 到这）</text>

  <!-- Two columns layout -->
  <!-- Left column: skill list -->
  <text x="62" y="188" font-size="9.5" fill="#374151" class="mono">├── analyze-stock/SKILL.md    ← 方法论 + 决策树</text>
  <text x="62" y="202" font-size="9.5" fill="#374151" class="mono">├── earnings-prep/SKILL.md       （markdown 指令，</text>
  <text x="62" y="216" font-size="9.5" fill="#374151" class="mono">├── macro-warning/SKILL.md         Claude 照着走）</text>
  <text x="62" y="230" font-size="9.5" fill="#374151" class="mono">├── ... 共 14 个 skill ...</text>
  <text x="62" y="244" font-size="9.5" fill="#374151" class="mono">│</text>
  <text x="62" y="258" font-size="9.5" fill="#374151" class="mono">├── review-investment-screenshot/scripts/</text>
  <text x="62" y="272" font-size="9.5" fill="#374151" class="mono">│   ├── insider_ratio.py    ← Python 帮手，</text>
  <text x="62" y="286" font-size="9.5" fill="#374151" class="mono">│   ├── quote_pull.py          Claude 执行它</text>
  <text x="62" y="300" font-size="9.5" fill="#374151" class="mono">│   └── option_walls.py · max_pain.py</text>

  <!-- Right column: firehose scripts -->
  <line x1="490" y1="176" x2="490" y2="326" stroke="#dbeafe" stroke-width="1"/>
  <text x="504" y="188" font-size="9.5" fill="#374151" class="mono">├── price-alert/</text>
  <text x="504" y="202" font-size="9.5" fill="#374151" class="mono">│   ├── alerts.json       ← 配置文件</text>
  <text x="504" y="216" font-size="9.5" fill="#b45309" class="mono">│   └── check_alerts.py   ← 不在本地跑 ↓</text>
  <text x="504" y="230" font-size="9.5" fill="#374151" class="mono">│</text>
  <text x="504" y="244" font-size="9.5" fill="#374151" class="mono">└── political-firehose/scripts/</text>
  <text x="504" y="258" font-size="9.5" fill="#374151" class="mono">    ├── political_firehose.py</text>
  <text x="504" y="272" font-size="9.5" fill="#b45309" class="mono">    ├── oge_watcher.py     ← 不在本地跑 ↓</text>
  <text x="504" y="286" font-size="9.5" fill="#b45309" class="mono">    └── congress_watcher.py   GitHub Actions</text>
  <text x="504" y="310" font-size="9" fill="#6b7280">（这三个脚本通过 git push 推上去，由 cron 调用）</text>

  <!-- ═══ git push arrow ═══ -->
  <line x1="460" y1="346" x2="460" y2="380" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)" stroke-dasharray="5,3"/>
  <rect x="380" y="352" width="160" height="20" rx="3" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="460" y="366" font-size="10" fill="#6b7280" text-anchor="middle">git push（你 commit 改动）</text>

  <!-- ═══ BOX 2: GITHUB ═══ -->
  <rect x="18" y="384" width="884" height="188" rx="7" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="18" y="384" width="884" height="30" rx="7" fill="#f59e0b"/>
  <rect x="18" y="400" width="884" height="14" fill="#f59e0b"/>
  <text x="36" y="404" font-size="12" font-weight="bold" fill="#ffffff">🐙  GITHUB  ——  小角色：存储 + cron，这里没有 AI</text>

  <!-- Repo section -->
  <rect x="36" y="420" width="200" height="42" rx="4" fill="#fef3c7" stroke="#fbbf24" stroke-width="1"/>
  <text x="48" y="436" font-size="10" font-weight="bold" fill="#92400e">📦 Repo</text>
  <text x="48" y="452" font-size="9" fill="#374151" class="mono">alerts.json  ← source of truth</text>

  <!-- GitHub Actions section -->
  <rect x="248" y="420" width="636" height="142" rx="4" fill="#fffbeb" stroke="#fbbf24" stroke-width="1"/>
  <text x="264" y="438" font-size="10" font-weight="bold" fill="#92400e">⏰ GitHub Actions cron-as-a-service（public repo 免费）</text>

  <!-- price-alerts.yml -->
  <rect x="264" y="446" width="180" height="50" rx="3" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="274" y="462" font-size="9" font-weight="bold" fill="#374151">price-alerts.yml</text>
  <text x="274" y="475" font-size="8.5" fill="#6b7280">每 2 分钟，24/7</text>
  <text x="274" y="488" font-size="8.5" fill="#9ca3af">Yahoo → 条件判断 → Telegram</text>

  <!-- political-firehose.yml -->
  <rect x="456" y="446" width="200" height="50" rx="3" fill="#ffffff" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="466" y="462" font-size="9" font-weight="bold" fill="#92400e">political-firehose.yml  ✨</text>
  <text x="466" y="475" font-size="8.5" fill="#6b7280">3×/天（9/13/17 UTC），工作日</text>
  <text x="466" y="488" font-size="8.5" fill="#9ca3af">OGE + House XML → PDF → Telegram</text>

  <!-- telegram-chat.yml -->
  <rect x="668" y="446" width="200" height="50" rx="3" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="678" y="462" font-size="9" font-weight="bold" fill="#374151">telegram-chat.yml</text>
  <text x="678" y="475" font-size="8.5" fill="#9ca3af">可选，选项 A chat</text>
  <text x="678" y="488" font-size="8.5" fill="#9ca3af">poll → Claude API → alerts.json</text>

  <!-- No AI labels -->
  <text x="354" y="510" font-size="8.5" fill="#9ca3af" text-anchor="middle">纯 Python</text>
  <text x="354" y="522" font-size="8.5" fill="#9ca3af" text-anchor="middle">无 AI</text>
  <text x="556" y="510" font-size="8.5" fill="#9ca3af" text-anchor="middle">纯 Python</text>
  <text x="556" y="522" font-size="8.5" fill="#9ca3af" text-anchor="middle">无 AI</text>
  <text x="768" y="510" font-size="8.5" fill="#9ca3af" text-anchor="middle">调 Claude API</text>
  <text x="768" y="522" font-size="8.5" fill="#9ca3af" text-anchor="middle">（可选）</text>

  <!-- ═══ HTTPS POST arrow ═══ -->
  <line x1="460" y1="572" x2="460" y2="606" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="460" y1="572" x2="460" y2="606" stroke="#6b7280" stroke-width="2" marker-start="url(#arr2)"/>
  <rect x="360" y="578" width="200" height="20" rx="3" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="460" y="592" font-size="10" fill="#6b7280" text-anchor="middle">HTTPS POST（Telegram 投递 / 接收）</text>

  <!-- ═══ BOX 3: TELEGRAM ═══ -->
  <rect x="18" y="608" width="884" height="42" rx="7" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="36" y="629" font-size="12" font-weight="bold" fill="#0369a1">✈  TELEGRAM  ——  通知 + bot 聊天。Telegram 服务器，永久免费。你的 @YourBot_bot</text>
  <text x="840" y="629" font-size="9" fill="#0284c7" text-anchor="middle">$0/月</text>

  <!-- All AI box label -->
  <rect x="840" y="62" width="54" height="18" rx="3" fill="#dbeafe"/>
  <text x="867" y="75" font-size="8.5" fill="#1e40af" text-anchor="middle" font-weight="bold">AI 在这</text>
  <rect x="840" y="392" width="54" height="18" rx="3" fill="#fef3c7"/>
  <text x="867" y="405" font-size="8.5" fill="#92400e" text-anchor="middle">无 AI</text>
</svg>
