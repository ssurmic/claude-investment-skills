  <text x="36" y="445" class="mono" font-size="9"   fill="#374151">  🟢 NVDA  Nvidia Corp     $1M–$5M   2/10</text>
  <text x="36" y="458" class="mono" font-size="9"   fill="#15803d" font-weight="bold">  🟢 ORCL  Oracle Corp     $1M–$5M   3/17  ★</text>
  <text x="36" y="471" class="mono" font-size="9"   fill="#374151">  🟢 HOOD  Robinhood       $1M–$5M   2/10</text>

